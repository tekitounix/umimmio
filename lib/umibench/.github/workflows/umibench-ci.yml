name: umibench CI

on:
  workflow_dispatch:
    inputs:
      run_renode:
        description: "Run optional Renode smoke check"
        required: false
        type: boolean
        default: false
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  host-tests:
    name: Host + Compile-fail Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Run host tests
        run: xmake test "test_umibench/*"

      - name: Run compile-fail tests
        run: xmake test "test_umibench_compile_fail/*"

  wasm-tests:
    name: WASM Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run wasm tests
        run: |
          source "$EMSDK/emsdk_env.sh"
          xmake test "umibench_wasm/*"

  arm-build:
    name: ARM Cross Build (GCC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Build STM32F4 GCC target
        run: xmake build umibench_stm32f4_renode_gcc

  renode-smoke:
    name: Renode Smoke Check (Manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_renode == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install Renode
        run: |
          wget https://github.com/renode/renode/releases/download/v1.14.0/renode-1.14.0.linux-portable.tar.gz
          tar xzf renode-1.14.0.linux-portable.tar.gz
          echo "$PWD/renode_1.14.0_portable" >> "$GITHUB_PATH"

      - name: Build STM32F4 GCC target
        run: xmake build umibench_stm32f4_renode_gcc

      - name: Run Renode script
        run: |
          timeout 120s renode --console --disable-xwt -e \
            "include @$PWD/platforms/arm/cortex-m/stm32f4/renode/bench_stm32f4_ci.resc"

      - name: Verify UART output
        run: |
          test -s build/umibench_stm32f4_renode_gcc/release/uart.log
