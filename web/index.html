<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMI-OS Synth Demo</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --primary: #0f3460;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #888;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 {
      margin: 0 0 10px;
      font-size: 2em;
    }
    
    .subtitle {
      color: var(--text-dim);
      margin-bottom: 30px;
    }
    
    .panel {
      background: var(--surface);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .panel h2 {
      margin: 0 0 15px;
      font-size: 1.2em;
      color: var(--accent);
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #666;
    }
    
    .status-dot.ready {
      background: #4caf50;
    }
    
    .status-dot.error {
      background: var(--accent);
    }
    
    button {
      background: var(--primary);
      color: var(--text);
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: var(--accent);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .keyboard {
      display: flex;
      gap: 2px;
      margin-top: 15px;
    }
    
    .key {
      width: 50px;
      height: 150px;
      background: white;
      border-radius: 0 0 4px 4px;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      color: #333;
      font-size: 12px;
    }
    
    .key:active, .key.active {
      background: #ddd;
    }
    
    .key.black {
      width: 35px;
      height: 90px;
      background: #333;
      color: #999;
      margin-left: -17px;
      margin-right: -17px;
      z-index: 1;
    }
    
    .key.black:active, .key.black.active {
      background: #555;
    }
    
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    
    .control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .control label {
      font-size: 0.9em;
      color: var(--text-dim);
    }
    
    .control input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    
    .control .value {
      font-size: 0.85em;
      color: var(--accent);
    }
    
    #log {
      background: #000;
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    
    .log-info { color: #4caf50; }
    .log-warn { color: #ff9800; }
    .log-error { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎹 UMI-OS Synth</h1>
    <p class="subtitle">WebAssembly Synthesizer Demo</p>
    
    <div class="panel">
      <h2>Status</h2>
      <div class="status">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Not initialized</span>
      </div>
      <button id="btn-start" onclick="startSynth()">Start Audio</button>
      <button id="btn-midi" onclick="initMidi()" disabled>Connect MIDI</button>
    </div>
    
    <div class="panel">
      <h2>Keyboard</h2>
      <p style="color: var(--text-dim); margin: 0 0 10px; font-size: 0.9em;">
        Click keys or use keyboard: A S D F G H J (white) / W E T Y U (black)
      </p>
      <div class="keyboard" id="keyboard">
        <!-- Keys generated by JavaScript -->
      </div>
    </div>
    
    <div class="panel">
      <h2>Controls</h2>
      <div class="controls">
        <div class="control">
          <label>Volume</label>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5"
                 oninput="setVolume(this.value)">
          <span class="value" id="volume-val">0.50</span>
        </div>
        <div class="control">
          <label>Filter Cutoff</label>
          <input type="range" id="cutoff" min="20" max="20000" step="1" value="8000"
                 oninput="setCutoff(this.value)">
          <span class="value" id="cutoff-val">8000 Hz</span>
        </div>
        <div class="control">
          <label>Filter Resonance</label>
          <input type="range" id="resonance" min="0" max="0.99" step="0.01" value="0.5"
                 oninput="setResonance(this.value)">
          <span class="value" id="resonance-val">0.50</span>
        </div>
      </div>
    </div>
    
    <div class="panel">
      <h2>Log</h2>
      <div id="log"></div>
    </div>
  </div>
  
  <script type="module">
    import { UmiSynth } from './umi.js';
    
    let synth = null;
    const keyMap = {};
    const activeKeys = new Set();
    
    // Keyboard mapping: key -> [note, isBlack]
    const keyboardMap = {
      'a': [60, false], // C4
      'w': [61, true],  // C#4
      's': [62, false], // D4
      'e': [63, true],  // D#4
      'd': [64, false], // E4
      'f': [65, false], // F4
      't': [66, true],  // F#4
      'g': [67, false], // G4
      'y': [68, true],  // G#4
      'h': [69, false], // A4
      'u': [70, true],  // A#4
      'j': [71, false], // B4
      'k': [72, false], // C5
    };
    
    // Note names
    const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    
    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const span = document.createElement('span');
      span.className = `log-${type}`;
      span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      el.appendChild(span);
      el.scrollTop = el.scrollHeight;
    }
    
    function updateStatus(ready, text) {
      document.getElementById('status-dot').className = `status-dot ${ready ? 'ready' : ''}`;
      document.getElementById('status-text').textContent = text;
    }
    
    // Generate keyboard UI
    function createKeyboard() {
      const keyboard = document.getElementById('keyboard');
      const notes = [
        { note: 60, black: false, label: 'C4' },
        { note: 61, black: true },
        { note: 62, black: false, label: 'D' },
        { note: 63, black: true },
        { note: 64, black: false, label: 'E' },
        { note: 65, black: false, label: 'F' },
        { note: 66, black: true },
        { note: 67, black: false, label: 'G' },
        { note: 68, black: true },
        { note: 69, black: false, label: 'A' },
        { note: 70, black: true },
        { note: 71, black: false, label: 'B' },
        { note: 72, black: false, label: 'C5' },
      ];
      
      notes.forEach(({ note, black, label }) => {
        const key = document.createElement('div');
        key.className = `key ${black ? 'black' : ''}`;
        key.dataset.note = note;
        key.textContent = label || '';
        
        key.addEventListener('mousedown', () => noteOn(note));
        key.addEventListener('mouseup', () => noteOff(note));
        key.addEventListener('mouseleave', () => noteOff(note));
        
        keyMap[note] = key;
        keyboard.appendChild(key);
      });
    }
    
    window.startSynth = async function() {
      try {
        log('Initializing...');
        updateStatus(false, 'Loading WASM...');
        
        synth = new UmiSynth();
        await synth.init({ 
          wasmUrl: '../.build/wasm/umi_synth.js',
          sampleRate: 48000 
        });
        
        await synth.start();
        
        updateStatus(true, 'Ready');
        log('Synth initialized successfully!');
        
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-midi').disabled = false;
        
        // Setup keyboard listeners
        setupKeyboardListeners();
        
      } catch (e) {
        log(`Error: ${e.message}`, 'error');
        updateStatus(false, `Error: ${e.message}`);
      }
    };
    
    window.initMidi = async function() {
      if (!synth) return;
      
      try {
        log('Connecting MIDI...');
        await synth.initMidi();
        log('MIDI connected');
      } catch (e) {
        log(`MIDI error: ${e.message}`, 'warn');
      }
    };
    
    function noteOn(note) {
      if (!synth || activeKeys.has(note)) return;
      activeKeys.add(note);
      synth.noteOn(note, 100);
      if (keyMap[note]) keyMap[note].classList.add('active');
      log(`Note On: ${noteNames[note % 12]}${Math.floor(note / 12) - 1}`);
    }
    
    function noteOff(note) {
      if (!synth || !activeKeys.has(note)) return;
      activeKeys.delete(note);
      synth.noteOff(note);
      if (keyMap[note]) keyMap[note].classList.remove('active');
    }
    
    function setupKeyboardListeners() {
      document.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        const mapping = keyboardMap[e.key.toLowerCase()];
        if (mapping) {
          noteOn(mapping[0]);
        }
      });
      
      document.addEventListener('keyup', (e) => {
        const mapping = keyboardMap[e.key.toLowerCase()];
        if (mapping) {
          noteOff(mapping[0]);
        }
      });
    }
    
    window.setVolume = function(value) {
      document.getElementById('volume-val').textContent = parseFloat(value).toFixed(2);
      if (synth) synth.setVolume(parseFloat(value));
    };
    
    window.setCutoff = function(value) {
      document.getElementById('cutoff-val').textContent = `${Math.round(value)} Hz`;
      if (synth) synth.setFilterCutoff(parseFloat(value));
    };
    
    window.setResonance = function(value) {
      document.getElementById('resonance-val').textContent = parseFloat(value).toFixed(2);
      if (synth) synth.setFilterResonance(parseFloat(value));
    };
    
    // Initialize keyboard on load
    createKeyboard();
    log('Ready. Click "Start Audio" to begin.');
  </script>
</body>
</html>
