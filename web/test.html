<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UMI-OS WASM Test</title>
  <style>
    body {
      font-family: monospace;
      background: #1a1a1a;
      color: #eee;
      padding: 20px;
    }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .info { color: #2196f3; }
    #results {
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>UMI-OS WASM Test Suite</h1>
  <div id="results">Loading WASM module...</div>
  
  <script type="module">
    const results = document.getElementById('results');
    let passed = 0;
    let failed = 0;
    
    function log(msg, type = 'info') {
      const span = document.createElement('span');
      span.className = type;
      span.textContent = msg + '\n';
      results.appendChild(span);
    }
    
    function assert(condition, name) {
      if (condition) {
        log(`✓ ${name}`, 'pass');
        passed++;
      } else {
        log(`✗ ${name}`, 'fail');
        failed++;
      }
    }
    
    async function runTests() {
      results.textContent = '';
      log('='.repeat(50), 'info');
      log('UMI-OS WASM Test Suite', 'info');
      log('='.repeat(50), 'info');
      log('');
      
      try {
        // Load WASM module
        log('Loading WASM module...', 'info');
        const module = await import('../.build/wasm/umi_test.js');
        const wasm = await module.default();
        log('WASM module loaded!', 'pass');
        log('');
        
        // Run type tests
        log('--- Type Tests ---', 'info');
        const typeResult = wasm._umi_test_types();
        assert(typeResult === 6, `Type tests passed: ${typeResult}/6`);
        log('');
        
        // Run DSP tests
        log('--- DSP Tests ---', 'info');
        const dspResult = wasm._umi_test_dsp();
        assert(dspResult === 6, `DSP tests passed: ${dspResult}/6`);
        log('');
        
        // Memory tests
        log('--- Memory Tests ---', 'info');
        const ptr = wasm._malloc(1024);
        assert(ptr > 0, 'malloc works');
        wasm._free(ptr);
        log('free works (no crash)', 'pass');
        passed++;
        log('');
        
      } catch (e) {
        log(`ERROR: ${e.message}`, 'fail');
        failed++;
      }
      
      // Summary
      log('='.repeat(50), 'info');
      const total = passed + failed;
      if (failed === 0) {
        log(`All ${passed} tests passed!`, 'pass');
      } else {
        log(`${passed}/${total} tests passed, ${failed} failed`, 'fail');
      }
      log('='.repeat(50), 'info');
      
      // Set global for headless testing
      window.testResults = { passed, failed, total };
      
      // For Playwright/Puppeteer
      if (window.onTestComplete) {
        window.onTestComplete({ passed, failed, total });
      }
    }
    
    runTests();
  </script>
</body>
</html>
