<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minimal AudioWorklet Test</title>
</head>
<body>
  <h1>Minimal AudioWorklet Test</h1>
  <button id="start">Start</button>
  <pre id="log"></pre>

  <script>
    const log = document.getElementById('log');
    function print(msg) {
      log.textContent += msg + '\n';
      console.log(msg);
    }

    document.getElementById('start').onclick = async () => {
      try {
        print('Creating AudioContext...');
        const ctx = new AudioContext({ sampleRate: 48000 });
        print('AudioContext created');

        print('Loading worklet module...');
        await ctx.audioWorklet.addModule('./umim_modules/synth.js');
        print('Module loaded');

        print('Creating AudioWorkletNode...');
        const node = new AudioWorkletNode(ctx, 'umi-synth-processor');
        print('Node created!');

        node.port.onmessage = (e) => {
          print('Message from worklet: ' + JSON.stringify(e.data));
        };

        node.connect(ctx.destination);
        print('Connected to destination');

        // Test note
        setTimeout(() => {
          print('Sending note on...');
          node.port.postMessage({ type: 'note-on', note: 60, velocity: 100 });
        }, 1000);

        setTimeout(() => {
          print('Sending note off...');
          node.port.postMessage({ type: 'note-off', note: 60 });
        }, 2000);

      } catch (err) {
        print('ERROR: ' + err.message);
        console.error(err);
      }
    };
  </script>
</body>
</html>
