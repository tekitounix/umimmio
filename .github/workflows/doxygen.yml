name: UMI Doxygen

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "lib/**"
      - ".github/workflows/doxygen.yml"
  pull_request:
    paths:
      - "lib/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: doxygen-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Doxygen (${{ matrix.lib }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lib: [umibench, umimmio, umirtm, umitest, umiport]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate docs
        run: cd lib/${{ matrix.lib }} && doxygen

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lib }}-doxygen-html
          path: lib/${{ matrix.lib }}/build/doxygen/html
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download all HTML artifacts
        uses: actions/download-artifact@v4
        with:
          path: site

      - name: Organize site structure
        run: |
          mkdir -p merged
          for lib in umibench umimmio umirtm umitest umiport; do
            mv "site/${lib}-doxygen-html" "merged/${lib}"
          done

      - name: Create index page
        run: |
          cat > merged/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><title>UMI API Documentation</title></head>
          <body>
          <h1>UMI API Documentation</h1>
          <ul>
            <li><a href="umibench/">umibench</a> — Cross-target microbenchmark framework</li>
            <li><a href="umimmio/">umimmio</a> — Type-safe MMIO register abstraction</li>
            <li><a href="umirtm/">umirtm</a> — RTT-compatible debug monitor</li>
            <li><a href="umitest/">umitest</a> — Zero-macro C++23 test framework</li>
            <li><a href="umiport/">umiport</a> — Shared platform infrastructure</li>
          </ul>
          </body></html>
          HTMLEOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: merged

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
