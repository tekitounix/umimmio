name: Release Libraries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Run tests
        run: xmake test

      - name: Parse version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate archives
        run: xmake release --ver=${{ steps.tag.outputs.version }} --no-test --no-tag

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/packages/*.tar.gz
            build/packages/*.sha256
          generate_release_notes: true

      - name: Show xmake-repo update instructions
        run: |
          echo "=== Update synthernet-xmake-repo ==="
          for f in build/packages/*.sha256; do
            echo "  $(basename "$f" .tar.gz.sha256): $(awk '{print $1}' "$f")"
          done
