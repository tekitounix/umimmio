name: Package Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # 毎週月曜 09:00 UTC
  workflow_dispatch:
    inputs:
      package:
        description: 'Check specific package (blank = all)'
        required: false
        type: string
      auto_update:
        description: 'Auto-update packages with new versions'
        required: false
        type: boolean
        default: false
  push:
    branches: [main, develop]
    paths:
      - 'xmake-repo/synthernet/packages/p/phc/**'
      - 'xmake-repo/synthernet/packages/c/clang-arm/**'
      - 'xmake-repo/synthernet/packages/g/gcc-arm/**'
      - 'xmake-repo/synthernet/packages/r/renode/**'

env:
  PHC_DIR: xmake-repo/synthernet/packages/p/phc
  PACKAGES_DIR: xmake-repo/synthernet/packages

jobs:
  validate:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install PHC plugin
        run: |
          mkdir -p ~/.xmake/plugins/phc
          cp -r ${{ env.PHC_DIR }}/plugins/phc/* ~/.xmake/plugins/phc/
          cp -r ${{ env.PHC_DIR }}/registry ~/.xmake/plugins/phc/

      - name: Validate registry ↔ xmake.lua consistency
        run: xmake phc -r ${{ env.PHC_DIR }}/registry/packages.lua --packages-dir ${{ env.PACKAGES_DIR }} validate

  generate-check:
    name: Verify Generated xmake.lua
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install PHC plugin
        run: |
          mkdir -p ~/.xmake/plugins/phc
          cp -r ${{ env.PHC_DIR }}/plugins/phc/* ~/.xmake/plugins/phc/
          cp -r ${{ env.PHC_DIR }}/registry ~/.xmake/plugins/phc/

      - name: Check xmake.lua files are up to date
        run: |
          xmake phc -r ${{ env.PHC_DIR }}/registry/packages.lua \
            --packages-dir ${{ env.PACKAGES_DIR }} -n generate 2>&1 | tee generate-check.txt
          if grep -q "would be updated\|would be created" generate-check.txt; then
            echo "::error::Generated xmake.lua files are out of date. Run 'xmake phc generate' to regenerate."
            exit 1
          fi
          echo "All generated files are up to date."

  check-links:
    name: Check Download Links
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      has_failures: ${{ steps.check.outputs.has_failures }}
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install PHC plugin
        run: |
          mkdir -p ~/.xmake/plugins/phc
          cp -r ${{ env.PHC_DIR }}/plugins/phc/* ~/.xmake/plugins/phc/
          cp -r ${{ env.PHC_DIR }}/registry ~/.xmake/plugins/phc/

      - name: Run link checker
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="-r ${{ env.PHC_DIR }}/registry/packages.lua -o link-report.json"
          if [ -n "${{ inputs.package }}" ]; then
            ARGS="$ARGS -p ${{ inputs.package }}"
          fi
          set +e
          xmake phc $ARGS check-links
          EXIT_CODE=$?
          set -e
          echo "has_failures=$( [ $EXIT_CODE -ne 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report
          path: link-report.json

  check-updates:
    name: Check Upstream Updates
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      update_packages: ${{ steps.check.outputs.update_packages }}
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install PHC plugin
        run: |
          mkdir -p ~/.xmake/plugins/phc
          cp -r ${{ env.PHC_DIR }}/plugins/phc/* ~/.xmake/plugins/phc/
          cp -r ${{ env.PHC_DIR }}/registry ~/.xmake/plugins/phc/

      - name: Run update checker
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_ARG=""
          if [ -n "${{ inputs.package }}" ]; then
            PKG_ARG="-p ${{ inputs.package }}"
          fi
          xmake phc -r ${{ env.PHC_DIR }}/registry/packages.lua \
            -o update-report.json $PKG_ARG check-updates
          HAS=$(python3 -c "import json; print('true' if json.load(open('update-report.json')).get('has_updates') else 'false')")
          echo "has_updates=$HAS" >> "$GITHUB_OUTPUT"
          # パッケージ名リストを出力（auto-update用）
          PKGS=$(python3 -c "
          import json
          r = json.load(open('update-report.json'))
          pkgs = [u['package'] for u in r.get('updates', []) if u.get('new_versions')]
          print(','.join(pkgs))
          ")
          echo "update_packages=$PKGS" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: update-report
          path: update-report.json

  auto-update:
    name: Auto-Update Packages
    runs-on: ubuntu-latest
    needs: check-updates
    if: >-
      needs.check-updates.outputs.has_updates == 'true' &&
      (inputs.auto_update == true || github.event_name == 'schedule')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install PHC plugin
        run: |
          mkdir -p ~/.xmake/plugins/phc
          cp -r ${{ env.PHC_DIR }}/plugins/phc/* ~/.xmake/plugins/phc/
          cp -r ${{ env.PHC_DIR }}/registry ~/.xmake/plugins/phc/

      - name: Update packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra PKGS <<< "${{ needs.check-updates.outputs.update_packages }}"
          for pkg in "${PKGS[@]}"; do
            if [ -z "$pkg" ]; then continue; fi
            echo "=== Updating $pkg ==="
            xmake phc -r ${{ env.PHC_DIR }}/registry/packages.lua \
              --packages-dir ${{ env.PACKAGES_DIR }} \
              -p "$pkg" update-package || echo "::warning::Failed to update $pkg"
          done

      - name: Re-install updated plugin
        run: |
          cp -r ${{ env.PHC_DIR }}/plugins/phc/* ~/.xmake/plugins/phc/
          cp -r ${{ env.PHC_DIR }}/registry ~/.xmake/plugins/phc/

      - name: Validate after update
        run: |
          xmake phc -r ${{ env.PHC_DIR }}/registry/packages.lua \
            --packages-dir ${{ env.PACKAGES_DIR }} validate

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: phc/auto-update
          commit-message: 'chore(phc): auto-update package versions'
          title: '[PHC] Auto-update package versions'
          body: |
            ## Auto-Update by PHC

            Updated packages: `${{ needs.check-updates.outputs.update_packages }}`

            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Changes include:
            - Updated `packages.lua` with new version entries and SHA256 hashes
            - Regenerated `xmake.lua` files

            ---
            *Auto-generated by PHC `update-package`.*
          labels: package-health

  notify:
    name: Create Issue on Detection
    runs-on: ubuntu-latest
    needs: [check-links, check-updates]
    if: >-
      needs.check-links.outputs.has_failures == 'true' ||
      (needs.check-updates.outputs.has_updates == 'true' && inputs.auto_update != true && github.event_name != 'schedule')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Package Health Check Report\n\n';
            body += `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;

            if ('${{ needs.check-links.outputs.has_failures }}' === 'true') {
              try {
                const r = JSON.parse(fs.readFileSync('link-report/link-report.json', 'utf8'));
                const fails = r.results.filter(x => x.status === 'fail');
                body += '### :x: Broken Links\n\n| Package | Version | Platform | HTTP |\n|---|---|---|---|\n';
                for (const f of fails) {
                  body += `| ${f.package} | ${f.version} | ${f.platform} | ${f.http_status ?? 'N/A'} |\n`;
                }
                body += '\n';
              } catch (e) {
                body += `Link report error: ${e.message}\n\n`;
              }
            }

            if ('${{ needs.check-updates.outputs.has_updates }}' === 'true') {
              try {
                const r = JSON.parse(fs.readFileSync('update-report/update-report.json', 'utf8'));
                const ups = r.updates.filter(u => u.new_versions.length > 0);
                body += '### :arrow_up: New Upstream Versions\n\n| Package | Current | New | Source |\n|---|---|---|---|\n';
                for (const u of ups) {
                  body += `| ${u.package} | ${u.current_latest} | ${u.new_versions.join(', ')} | ${u.source} |\n`;
                }
              } catch (e) {
                body += `Update report error: ${e.message}\n\n`;
              }
            }

            body += '\n---\n*Auto-generated by PHC.*\n';

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'package-health', state: 'open', per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              const title = [];
              if ('${{ needs.check-links.outputs.has_failures }}' === 'true') title.push('Broken links');
              if ('${{ needs.check-updates.outputs.has_updates }}' === 'true') title.push('New versions');
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[Package Health] ${title.join(' / ')}`,
                body, labels: ['package-health'],
              });
            }
