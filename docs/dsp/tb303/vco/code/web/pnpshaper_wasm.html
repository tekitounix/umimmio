<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNP Waveshaper Synth (WASM)</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f5f5f5; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px; }
    .card { background: rgba(23,23,23,0.6); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
    .title { font-size: 20px; font-weight: 600; }
    .subtitle { font-size: 14px; color: #d4d4d4; margin-top: 4px; }
    .btn-row { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #f5f5f5; color: #0a0a0a; }
    .btn-secondary { background: #262626; color: #f5f5f5; border: 1px solid #404040; }
    .status { margin-top: 12px; font-size: 14px; color: #d4d4d4; }
    .scope-box { margin-top: 16px; background: rgba(10,10,10,0.6); border: 1px solid #262626; border-radius: 16px; padding: 12px; }
    .scope-label { font-size: 12px; color: #a3a3a3; margin-bottom: 8px; }
    .scope-canvas { width: 100%; height: 200px; border-radius: 12px; background: #000; }
    .controls { margin-top: 16px; display: grid; gap: 16px; }
    .control-label { font-size: 14px; color: #e5e5e5; margin-bottom: 8px; }
    .control-range { width: 100%; }
    .control-hint { font-size: 12px; color: #a3a3a3; margin-top: 4px; }
    .help { font-size: 14px; color: #d4d4d4; }
    .help-title { font-weight: 600; color: #e5e5e5; margin-bottom: 8px; }
    .help ol { padding-left: 20px; }
    .help li { margin: 4px 0; }
    .midi-help { margin-top: 16px; font-size: 12px; color: #a3a3a3; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// WASM binary embedded as base64 (WaveShaper3Var 2-iter)
const WASM_BASE64 = "AGFzbQEAAAABGQVgAABgAAF/YAF9AGABfwBgBn19fX9/fwADDAsAAAICAAEBAwQDAQQFAXABAgIFBgEBggKCAgYIAX8BQcCQBAsH3wEMBm1lbW9yeQIAB3dzX2luaXQAARJ3c19zZXRfc2FtcGxlX3JhdGUAAgl3c19zZXRfYzIAAwh3c19yZXNldAAEEHdzX2dldF9pbnB1dF9wdHIABRF3c19nZXRfb3V0cHV0X3B0cgAGEHdzX3Byb2Nlc3NfYmxvY2sABwtfaW5pdGlhbGl6ZQAAGV9faW5kaXJlY3RfZnVuY3Rpb25fdGFibGUBABlfZW1zY3JpcHRlbl9zdGFja19yZXN0b3JlAAkcZW1zY3JpcHRlbl9zdGFja19nZXRfY3VycmVudAAKCQcBAEEBCwEACukMCwIAC3IAQbAIQb3vmKwDNgIAQZAIQtyeqoXk57DXNzcCAEGICEKAgICIhICAgMEANwIAQYAIQoCAgICAgICAwQA3AgBBqAhCvprC8fPsoeG4fzcCAEGgCEKkluDQo43h68QANwIAQZgIQoLR7s/j9KaiPTcCAAt9AQF9QZQIQwAAgD8gAJUiADgCAEGYCEN3zCsyIACVIgE4AgBBnAhBsAgqAgAgAJU4AgBBoAggAUMXt9E4kiIAOAIAQaQIQwAAgD8gAJUiADgCAEGoCCAAQxe30TiUIgA4AgBBrAggAEMAAIC/kkMXt9E4lEOsxSe3kjgCAAt9AEGwCCAAQ703hjWUIgA4AgBBnAggAEGUCCoCACIAlTgCAEGYCEN3zCsyIACVIgA4AgBBoAggAEMXt9E4kiIAOAIAQaQIQwAAgD8gAJUiADgCAEGoCCAAQxe30TiUIgA4AgBBrAggAEMAAIC/kkMXt9E4lEOsxSe3kjgCAAswAEGQCEHcnqqFBDYCAEGICEKAgICIhICAgMEANwIAQYAIQoCAgICAgICAwQA3AgALBQBBwAgLBQBBwAwLgwICA38FfSMAQRBrIgEkACAAQQBKBEBBkAgqAgAhB0GICCoCACEIQYQIKgIAIQRBgAgqAgAhBQNAIAJBAnQiA0HACGoqAgAhBiABIAg4AgwgASAEOAIIIAEgBzgCBCAGIAQgBiAFk0GYCCoCAJQiBSABQQxqIAFBCGogAUEEahAIIAYgBCAFIAFBDGogAUEIaiABQQRqEAhBjAggASoCCCIEOAIAQYgIIAEqAgwiCDgCAEGECCAEOAIAQZAIIAEqAgQiBzgCAEGACCAGIAhDF7fROJQgBZJBpAgqAgCUkyIFOAIAIANBwAxqIAc4AgAgAkEBaiICIABHDQALCyABQRBqJAALpgcCDn0BfwJ9IAQqAgAiCSADKgIAIgyTIgZDxm2EP14EQENEUOhIIQcgBkPGbYS/kkNEUOhIlEMBSEBGkgwBCyAGQ8ZthL5dBEBDzLyMKyEHQxMuYakMAQtDAACuwkMAALBCIAZDLqYaQpQiByAHQwAAsEJeGyAHQwAArsJdGyIHIAdDO6o4S5RDAAB+TpL8ACIUQYCAgPwDa7JDO6o4S5WTIgcgB0MAAAA/lEMAAIA/kpRDAACAP5IgFL6UIgZD5AcILJRDzLyMK5IhByAGQwAAgL+SQxMuYSmUCyEKAn0gBSoCACIQIAyTIghDxm2EP14EQENEUOhIIQYgCEPGbYS/kkNEUOhIlEMBSEBGkgwBCyAIQ8ZthL5dBEBDzLyMKyEGQxMuYakMAQtDAACuwkMAALBCIAhDLqYaQpQiBiAGQwAAsEJeGyAGQwAArsJdGyIGIAZDO6o4S5RDAAB+TpL8ACIUQYCAgPwDa7JDO6o4S5WTIgYgBkMAAAA/lEMAAIA/kpRDAACAP5IgFL6UIghD5AcILJRDzLyMK5IhBiAIQwAAgL+SQxMuYSmUCyEIIANDAAAAAEMAAEhBQwAAAD9DAACAPyAGQy66aL+UIAdDALpZu5RBrAgqAgAiEZKSlSILIAdDALpZO5QiDowgBkOMLro9lCALIAZDjC66vZQgB5KUIg0gBkMuumg/lCIPlJMiEiALIAdDRiZ/v5QgBpKUIgsgCEOMLrq9lCAKkiITIApDRiZ/P5QgCJMiCJMgESAMlCAAQ6zFJzeUIAJDF7fROJRBpAgqAgCUkpKSIgqUQ1yPqkAgEJNDF7fROJQgCJKSIgiUQxe30bggBpMgCyAPlJMiBiANIAqUQwAAQEEgCZNDcqY+OJQgE5NBnAgqAgAiAiAJIAGTlJOSIgmUk0MAAIA/Q3KmPrggB5MgApMgDSAOlJMiDSAGlCASIAdDRiZ/P5QgCyAOlJMiBpSTlSILlCIHlCAKkyAPIAYgCZQgDSAIlJMgC5QiBpSTlCIKiyIJIAeLIgggCCAJXRsiCSAGiyIIIAggCV0bIgmVQwAAgD8gCUMAAAA/XhsiCSAKlCAMkiIMIAxDAABIQV4bIAxDAAAAAF0bOAIAIARDAAAAAEMAAEhBIAkgB5QgBCoCAJIiByAHQwAASEFeGyAHQwAAAABdGzgCACAFQwAAAABDAABIQSAJIAaUIAUqAgCSIgcgB0MAAEhBXhsgB0MAAAAAXRs4AgALBgAgACQACwQAIwAL";

const workletCode = `
// WASM embedded
const WASM_BASE64 = "${WASM_BASE64}";

// Base64 decoder for AudioWorklet (atob is not available)
function base64ToArrayBuffer(base64) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
  const lookup = new Uint8Array(256);
  for (let i = 0; i < chars.length; i++) lookup[chars.charCodeAt(i)] = i;

  let bufLen = base64.length * 0.75;
  if (base64[base64.length - 1] === "=") bufLen--;
  if (base64[base64.length - 2] === "=") bufLen--;

  const bytes = new Uint8Array(bufLen);
  let p = 0;

  for (let i = 0; i < base64.length; i += 4) {
    const e1 = lookup[base64.charCodeAt(i)];
    const e2 = lookup[base64.charCodeAt(i + 1)];
    const e3 = lookup[base64.charCodeAt(i + 2)];
    const e4 = lookup[base64.charCodeAt(i + 3)];

    bytes[p++] = (e1 << 2) | (e2 >> 4);
    if (base64[i + 2] !== "=") bytes[p++] = ((e2 & 15) << 4) | (e3 >> 2);
    if (base64[i + 3] !== "=") bytes[p++] = ((e3 & 3) << 6) | e4;
  }

  return bytes.buffer;
}

class WaveShaperProcessor extends AudioWorkletProcessor {
  static get parameterDescriptors() {
    return [
      { name: "c2_uF", defaultValue: 1.0, minValue: 0.1, maxValue: 10.0, automationRate: "k-rate" },
      { name: "outGain", defaultValue: 0.25, minValue: 0.0, maxValue: 1.0, automationRate: "k-rate" },
      { name: "freq", defaultValue: 18.165, minValue: 18.165, maxValue: 440.0, automationRate: "k-rate" },
    ];
  }

  constructor() {
    super();
    this.wasmReady = false;
    this.phase = 0;
    this.gate = false;
    this.inputPtr = 0;
    this.outputPtr = 0;

    this.initWasm();

    this.port.onmessage = (e) => {
      if (e.data.type === "gate") {
        this.gate = e.data.on;
        if (!this.gate && this.ws_reset) {
          this.ws_reset();
        }
      }
    };
  }

  async initWasm() {
    try {
      const wasmBinary = base64ToArrayBuffer(WASM_BASE64);
      const { instance } = await WebAssembly.instantiate(wasmBinary, {});

      this.wasm = instance.exports;
      this.memory = this.wasm.memory;

      this.ws_init = this.wasm.ws_init;
      this.ws_reset = this.wasm.ws_reset;
      this.ws_set_sample_rate = this.wasm.ws_set_sample_rate;
      this.ws_set_c2 = this.wasm.ws_set_c2;
      this.ws_process_block = this.wasm.ws_process_block;
      this.ws_get_input_ptr = this.wasm.ws_get_input_ptr;
      this.ws_get_output_ptr = this.wasm.ws_get_output_ptr;

      this.ws_init();
      this.ws_set_sample_rate(sampleRate);
      this.ws_set_c2(1.0);

      this.lastC2 = 1.0;

      this.inputPtr = this.ws_get_input_ptr();
      this.outputPtr = this.ws_get_output_ptr();

      this.wasmReady = true;
      this.port.postMessage({ type: "ready" });
    } catch (err) {
      this.port.postMessage({ type: "error", message: err.toString() });
    }
  }

  process(inputs, outputs, parameters) {
    const out = outputs[0][0];
    if (!out) return true;

    if (!this.wasmReady || !this.gate) {
      out.fill(0);
      return true;
    }

    const freq = parameters.freq[0];
    const outGain = parameters.outGain[0];
    const c2 = parameters.c2_uF[0];
    const phaseInc = freq / sampleRate;

    if (c2 !== this.lastC2) {
      this.ws_set_c2(c2);
      this.lastC2 = c2;
    }

    const inputArray = new Float32Array(this.memory.buffer, this.inputPtr, 128);
    const outputArray = new Float32Array(this.memory.buffer, this.outputPtr, 128);

    // Generate PolyBLEP saw wave
    for (let i = 0; i < out.length; i++) {
      let t = this.phase;
      let y = 1.0 - 2.0 * t;
      if (t < phaseInc) {
        const x = t / phaseInc;
        y += x + x - x * x - 1.0;
      } else if (t > 1.0 - phaseInc) {
        const x = (t - 1.0) / phaseInc;
        y += x * x + x + x + 1.0;
      }
      this.phase = t + phaseInc;
      if (this.phase >= 1.0) this.phase -= 1.0;
      inputArray[i] = 8.75 + 3.25 * y;
    }

    this.ws_process_block(out.length);

    for (let i = 0; i < out.length; i++) {
      const v = outputArray[i];
      out[i] = Math.max(-1, Math.min(1, ((v - 6.0) / 6.0) * outGain));
    }

    return true;
  }
}
registerProcessor("waveshaper-wasm", WaveShaperProcessor);
`;

function midiNoteToHz(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

function ccToRange(v, min, max) {
  const t = Math.min(127, Math.max(0, v)) / 127;
  return min + (max - min) * t;
}

function normToLog(norm, min, max) {
  const lo = Math.log10(min);
  const hi = Math.log10(max);
  return Math.pow(10, lo + (hi - lo) * norm);
}

function logToNorm(value, min, max) {
  const lo = Math.log10(min);
  const hi = Math.log10(max);
  return (Math.log10(value) - lo) / (hi - lo);
}

function clamp01(x) {
  return Math.min(1, Math.max(0, x));
}

function App() {
  const [ready, setReady] = useState(false);
  const [running, setRunning] = useState(false);
  const [midiState, setMidiState] = useState("MIDI: not connected");
  const [wasmStatus, setWasmStatus] = useState("Ready");

  const [c2Norm, setC2Norm] = useState(logToNorm(1.0, 0.1, 10.0));
  const [c2uF, setC2uF] = useState(1.0);
  const [outGain, setOutGain] = useState(0.25);

  const ctxRef = useRef(null);
  const nodeRef = useRef(null);
  const analyserRef = useRef(null);
  const srRef = useRef(48000);
  const freqRef = useRef(18.165);
  const scopeBufRef = useRef(null);
  const rafRef = useRef(0);
  const midiRef = useRef(null);
  const canvasRef = useRef(null);

  const workletUrl = useMemo(() => {
    const blob = new Blob([workletCode], { type: "application/javascript" });
    return URL.createObjectURL(blob);
  }, []);

  useEffect(() => {
    return () => {
      try { URL.revokeObjectURL(workletUrl); } catch {}
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [workletUrl]);

  function drawScope() {
    const canvas = canvasRef.current;
    const analyser = analyserRef.current;
    const buf = scopeBufRef.current;

    if (!canvas || !analyser || !buf) {
      rafRef.current = requestAnimationFrame(drawScope);
      return;
    }

    analyser.getFloatTimeDomainData(buf);

    const sr = srRef.current || 48000;
    const f = Math.max(18.165, Math.min(440.0, freqRef.current || 18.165));

    const periodsToShow = 2;
    let win = Math.round((sr / f) * periodsToShow);
    win = Math.max(64, Math.min(win, buf.length));

    const center = Math.floor(buf.length / 2);
    let trigIndex = center;
    let bestDist = 1e9;
    const triggerLevel = 0.0;

    for (let i = 1; i < buf.length; i++) {
      if (buf[i - 1] < triggerLevel && buf[i] >= triggerLevel) {
        const d = Math.abs(i - center);
        if (d < bestDist) {
          bestDist = d;
          trigIndex = i;
        }
      }
    }

    let start = trigIndex - Math.floor(win / 2);
    if (start < 0) start = 0;
    if (start > buf.length - win) start = buf.length - win;

    const ctx2d = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx2d.clearRect(0, 0, w, h);

    ctx2d.globalAlpha = 0.35;
    ctx2d.strokeStyle = "#888";
    ctx2d.lineWidth = 1;
    ctx2d.beginPath();
    for (let i = 1; i < 8; i++) {
      const x = (w * i) / 8;
      ctx2d.moveTo(x, 0);
      ctx2d.lineTo(x, h);
    }
    for (let i = 1; i < 4; i++) {
      const y = (h * i) / 4;
      ctx2d.moveTo(0, y);
      ctx2d.lineTo(w, y);
    }
    ctx2d.stroke();

    ctx2d.globalAlpha = 0.7;
    ctx2d.strokeStyle = "#aaa";
    ctx2d.lineWidth = 1;
    ctx2d.beginPath();
    ctx2d.moveTo(w * 0.5, 0);
    ctx2d.lineTo(w * 0.5, h);
    ctx2d.stroke();

    ctx2d.globalAlpha = 1.0;
    ctx2d.strokeStyle = "#fff";
    ctx2d.lineWidth = 2;
    ctx2d.beginPath();

    for (let i = 0; i < win; i++) {
      const s = buf[start + i];
      const x = (i / (win - 1)) * w;
      const y = (0.5 - 0.5 * s) * h;
      if (i === 0) ctx2d.moveTo(x, y);
      else ctx2d.lineTo(x, y);
    }

    ctx2d.stroke();

    rafRef.current = requestAnimationFrame(drawScope);
  }

  async function ensureAudio() {
    if (ctxRef.current && nodeRef.current) return;

    const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    srRef.current = ctx.sampleRate;

    // GC防止: windowオブジェクトに参照を保持
    ctx.onstatechange = () => {};
    window.__audioCtx = ctx;

    await ctx.audioWorklet.addModule(workletUrl);

    const node = new AudioWorkletNode(ctx, "waveshaper-wasm", {
      numberOfInputs: 0,
      numberOfOutputs: 1,
      outputChannelCount: [1],
    });

    // GC防止
    window.__audioNode = node;

    node.port.onmessage = (e) => {
      if (e.data.type === "ready") {
        setWasmStatus("WASM running");
      } else if (e.data.type === "error") {
        setWasmStatus("WASM error: " + e.data.message);
      }
    };

    const analyser = ctx.createAnalyser();
    analyser.fftSize = 32768;

    node.connect(analyser);
    analyser.connect(ctx.destination);

    ctxRef.current = ctx;
    nodeRef.current = node;
    analyserRef.current = analyser;
    scopeBufRef.current = new Float32Array(analyser.fftSize);

    freqRef.current = 18.165;

    setReady(true);

    node.parameters.get("c2_uF").setValueAtTime(c2uF, ctx.currentTime);
    node.parameters.get("outGain").setValueAtTime(outGain, ctx.currentTime);
    node.parameters.get("freq").setValueAtTime(18.165, ctx.currentTime);

    if (!rafRef.current) rafRef.current = requestAnimationFrame(drawScope);
  }

  function setParam(name, value) {
    const ctx = ctxRef.current;
    const node = nodeRef.current;
    if (!ctx || !node) return;
    const p = node.parameters.get(name);
    if (!p) return;
    p.setValueAtTime(value, ctx.currentTime);
    if (name === "freq") freqRef.current = value;
  }

  async function start() {
    await ensureAudio();
    const ctx = ctxRef.current;
    const node = nodeRef.current;
    if (!ctx || !node) return;
    await ctx.resume();
    node.port.postMessage({ type: "gate", on: true });
    setRunning(true);
  }

  function stop() {
    const node = nodeRef.current;
    if (!node) return;
    node.port.postMessage({ type: "gate", on: false });
    setRunning(false);
  }

  async function connectMidi() {
    if (!navigator.requestMIDIAccess) {
      setMidiState("MIDI: Web MIDI API not available");
      return;
    }

    try {
      const access = await navigator.requestMIDIAccess();
      midiRef.current = access;

      const bindInputs = () => {
        const inputs = Array.from(access.inputs.values());
        if (inputs.length === 0) {
          setMidiState("MIDI: no inputs");
          return;
        }

        for (const input of inputs) {
          input.onmidimessage = (e) => onMidiMessage(e);
        }

        const names = inputs.map((v) => v.name || "(unnamed)").join(", ");
        setMidiState("MIDI: " + names);
      };

      access.onstatechange = () => bindInputs();
      bindInputs();
    } catch (err) {
      setMidiState("MIDI: permission denied");
    }
  }

  function onMidiMessage(e) {
    const data = e.data;
    if (!data || data.length < 2) return;

    const status = data[0] & 0xf0;
    const noteOrCc = data[1] & 0x7f;
    const value = data.length > 2 ? data[2] & 0x7f : 0;

    if (status === 0x90) {
      if (value === 0) {
        stop();
        return;
      }
      const hz = midiNoteToHz(noteOrCc);
      const f = Math.min(440, Math.max(18.165, hz));
      setParam("freq", f);
      start();
      return;
    }

    if (status === 0x80) {
      stop();
      return;
    }

    if (status === 0xb0) {
      if (noteOrCc === 21) {
        const norm = value / 127;
        const v = normToLog(norm, 0.1, 10.0);
        setC2Norm(norm);
        setC2uF(v);
        setParam("c2_uF", v);
      } else if (noteOrCc === 22) {
        const v = ccToRange(value, 0.0, 1.0);
        setOutGain(v);
        setParam("outGain", v);
      }
    }
  }

  useEffect(() => {
    if (!ready) return;
    setParam("c2_uF", c2uF);
  }, [c2uF, ready]);

  useEffect(() => {
    if (!ready) return;
    setParam("outGain", outGain);
  }, [outGain, ready]);

  return (
    <div className="container">
      <div className="card">
        <div className="title">PNP Waveshaper Synth (WASM)</div>
        <div className="subtitle">WaveShaper3Var (2-iter) + AudioWorklet + Web MIDI</div>

        <div className="btn-row">
          {!running ? (
            <button className="btn btn-primary" onClick={start}>Start</button>
          ) : (
            <button className="btn btn-secondary" onClick={stop}>Stop</button>
          )}
          <button className="btn btn-secondary" onClick={connectMidi}>Connect MIDI</button>
        </div>

        <div className="status">{midiState}</div>
        <div className="status">{wasmStatus}</div>

        <div className="scope-box">
          <div className="scope-label">Oscilloscope</div>
          <canvas ref={canvasRef} width={720} height={200} className="scope-canvas" />
        </div>

        <div className="controls">
          <div>
            <div className="control-label">C2 (uF) CC21: {c2uF.toFixed(3)}</div>
            <input
              type="range"
              className="control-range"
              min={0}
              max={1}
              step={0.0005}
              value={c2Norm}
              onChange={(e) => {
                const n = clamp01(Number(e.target.value));
                const v = normToLog(n, 0.1, 10.0);
                setC2Norm(n);
                setC2uF(v);
              }}
            />
            <div className="control-hint">range 0.1 to 10 uF log</div>
          </div>

          <div>
            <div className="control-label">Output gain CC22: {outGain.toFixed(3)}</div>
            <input
              type="range"
              className="control-range"
              min={0}
              max={1}
              step={0.001}
              value={outGain}
              onChange={(e) => setOutGain(Number(e.target.value))}
            />
          </div>
        </div>

        <div className="midi-help">
          MIDI: Note On で発音。Note Off で停止。CC21 C2。CC22 出力ゲイン。
        </div>
      </div>

      <div className="card help">
        <div className="help-title">操作</div>
