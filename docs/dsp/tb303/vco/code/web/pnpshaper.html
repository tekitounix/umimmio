<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNP Waveshaper Synth</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f5f5f5; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px; }
    .card { background: rgba(23,23,23,0.6); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
    .title { font-size: 20px; font-weight: 600; }
    .subtitle { font-size: 14px; color: #d4d4d4; margin-top: 4px; }
    .btn-row { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: 12px; border: none; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #f5f5f5; color: #0a0a0a; }
    .btn-secondary { background: #262626; color: #f5f5f5; border: 1px solid #404040; }
    .status { margin-top: 12px; font-size: 14px; color: #d4d4d4; }
    .scope-box { margin-top: 16px; background: rgba(10,10,10,0.6); border: 1px solid #262626; border-radius: 16px; padding: 12px; }
    .scope-label { font-size: 12px; color: #a3a3a3; margin-bottom: 8px; }
    .scope-canvas { width: 100%; height: 200px; border-radius: 12px; background: #000; }
    .controls { margin-top: 16px; display: grid; gap: 16px; }
    .control-label { font-size: 14px; color: #e5e5e5; margin-bottom: 8px; }
    .control-range { width: 100%; }
    .control-hint { font-size: 12px; color: #a3a3a3; margin-top: 4px; }
    .help { font-size: 14px; color: #d4d4d4; }
    .help-title { font-weight: 600; color: #e5e5e5; margin-bottom: 8px; }
    .help ol { padding-left: 20px; }
    .help li { margin: 4px 0; }
    .midi-help { margin-top: 16px; font-size: 12px; color: #a3a3a3; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const workletCode = `
class FloatBits {
  constructor() {
    this.buf = new ArrayBuffer(4);
    this.f32 = new Float32Array(this.buf);
    this.i32 = new Int32Array(this.buf);
  }
  i2f(i) { this.i32[0] = i | 0; return this.f32[0]; }
}
const bits = new FloatBits();

function clamp(x, lo, hi) { return Math.min(hi, Math.max(lo, x)); }

const V_CC = 12.0;
const V_COLL = 5.33;
const R2 = 100e3;
const R3 = 10e3;
const R4 = 22e3;
const R5 = 10e3;
const C1 = 10e-9;

const V_T = 0.025865;
const V_T_INV = 1.0 / V_T;
const I_S = 1e-13;
const ALPHA_R = 0.5 / 1.5;
const V_CRIT = V_T * 40.0;

const G2 = 1.0 / R2;
const G3 = 1.0 / R3;
const G4 = 1.0 / R4;
const G5 = 1.0 / R5;

function fast_exp(x) {
  x = clamp(x, -87.0, 88.0);
  const LOG2E = 1.4426950408889634;
  const SHIFT = (1 << 23) * 127.0;
  const SCALE = (1 << 23) * LOG2E;
  const ui = (SCALE * x + SHIFT) | 0;
  let uf = bits.i2f(ui);
  const t = x - (ui - (SHIFT | 0)) / SCALE;
  uf *= (1.0 + t * (1.0 + t * 0.5));
  return uf;
}

function diode_iv(v) {
  let i, g;
  if (v > V_CRIT) {
    const exp_crit = fast_exp(V_CRIT * V_T_INV);
    g = I_S * V_T_INV * exp_crit;
    i = I_S * (exp_crit - 1.0) + g * (v - V_CRIT);
  } else if (v < -10.0 * V_T) {
    i = -I_S;
    g = 1e-12;
  } else {
    const exp_v = fast_exp(v * V_T_INV);
    i = I_S * (exp_v - 1.0);
    g = I_S * V_T_INV * exp_v + 1e-12;
  }
  return { i, g };
}

function solve_sparse(
  a11, a12,
  a21, a22, a23, a24,
  a32, a33, a34,
  a42, a43, a44,
  b1, b2, b3, b4
) {
  const inv_a11 = 1.0 / a11;
  const m21 = a21 * inv_a11;
  const a22p = a22 - m21 * a12;
  const b2p = b2 - m21 * b1;
  const inv_a22p = 1.0 / a22p;
  const m32 = a32 * inv_a22p;
  const m42 = a42 * inv_a22p;
  const a33p = a33 - m32 * a23;
  const a34p = a34 - m32 * a24;
  const b3p = b3 - m32 * b2p;
  const a43p = a43 - m42 * a23;
  const a44p = a44 - m42 * a24;
  const b4p = b4 - m42 * b2p;
  const det = a33p * a44p - a34p * a43p;
  if (Math.abs(det) < 1e-15) return null;
  const inv_det = 1.0 / det;
  const x2 = (a44p * b3p - a34p * b4p) * inv_det;
  const x3 = (a33p * b4p - a43p * b3p) * inv_det;
  const x1 = (b2p - a23 * x2 - a24 * x3) * inv_a22p;
  const x0 = (b1 - a12 * x1) * inv_a11;
  return { x0, x1, x2, x3 };
}

function polyBlep(t, dt) {
  if (t < dt) {
    const x = t / dt;
    return x + x - x * x - 1.0;
  }
  if (t > 1.0 - dt) {
    const x = (t - 1.0) / dt;
    return x * x + x + x + 1.0;
  }
  return 0.0;
}

class WaveShaperOneIter {
  constructor() {
    this.v_c1 = 0.0;
    this.v_c2 = 8.0;
    this.v_b = 8.0;
    this.v_e = 8.0;
    this.v_c = V_COLL;
    this.dt = 1.0 / 48000.0;
    this.g_c1 = C1 / this.dt;
    this.g_c2 = 1e-6 / this.dt;
    this.beta_f = 300.0;
    this.alpha_f = this.beta_f / (this.beta_f + 1.0);
  }
  setSampleRate(sr) {
    this.dt = 1.0 / sr;
    this.g_c1 = C1 / this.dt;
  }
  setC2Farad(c2) { this.g_c2 = c2 / this.dt; }
  setHfe(hfe) {
    this.beta_f = hfe;
    this.alpha_f = this.beta_f / (this.beta_f + 1.0);
  }
  reset() {
    this.v_c1 = 0.0;
    this.v_c2 = 8.0;
    this.v_b = 8.0;
    this.v_e = 8.0;
    this.v_c = V_COLL;
  }
  process(v_in) {
    const v_c1_prev = this.v_c1;
    const v_c2_prev = this.v_c2;
    let v_cap = v_in - v_c1_prev;
    let v_b = this.v_b;
    let v_e = v_c2_prev;
    let v_c = this.v_c;
    const r = this.newton_step(v_in, v_c1_prev, v_c2_prev, v_cap, v_b, v_e, v_c);
    v_cap = r.v_cap;
    v_b = r.v_b;
    v_e = r.v_e;
    v_c = r.v_c;
    this.v_c1 = v_in - v_cap;
    this.v_c2 = v_e;
    this.v_b = v_b;
    this.v_e = v_e;
    this.v_c = v_c;
    return v_c;
  }
  newton_step(v_in, v_c1_prev, v_c2_prev, v_cap, v_b, v_e, v_c) {
    const v_eb = v_e - v_b;
    const v_cb = v_c - v_b;
    const ef = diode_iv(v_eb);
    const cr = diode_iv(v_cb);
    const i_ef = ef.i, g_ef = ef.g;
    const i_cr = cr.i, g_cr = cr.g;
    const i_e = i_ef - ALPHA_R * i_cr;
    const i_c = this.alpha_f * i_ef - i_cr;
    const i_b = i_e - i_c;
    const f1 = this.g_c1 * (v_in - v_cap - v_c1_prev) - G3 * (v_cap - v_b);
    const f2 = G2 * (v_in - v_b) + G3 * (v_cap - v_b) + i_b;
    const f3 = G4 * (V_CC - v_e) - i_e - this.g_c2 * (v_e - v_c2_prev);
    const f4 = G5 * (V_COLL - v_c) + i_c;
    const j11 = -this.g_c1 - G3;
    const j12 = G3;
    const j21 = G3;
    const j22 = -G2 - G3 - (1.0 - this.alpha_f) * g_ef - (1.0 - ALPHA_R) * g_cr;
    const j23 = (1.0 - this.alpha_f) * g_ef;
    const j24 = (1.0 - ALPHA_R) * g_cr;
    const j32 = g_ef - ALPHA_R * g_cr;
    const j33 = -G4 - g_ef - this.g_c2;
    const j34 = ALPHA_R * g_cr;
    const j42 = -this.alpha_f * g_ef + g_cr;
    const j43 = this.alpha_f * g_ef;
    const j44 = -G5 - g_cr;
    const sol = solve_sparse(
      j11, j12,
      j21, j22, j23, j24,
      j32, j33, j34,
      j42, j43, j44,
      -f1, -f2, -f3, -f4
    );
    if (sol) {
      const dv0 = sol.x0;
      const dv1 = sol.x1;
      const dv2 = sol.x2;
      const dv3 = sol.x3;
      const max_dv = Math.max(Math.abs(dv0), Math.abs(dv1), Math.abs(dv2), Math.abs(dv3));
      const damp = (max_dv > 0.5) ? (0.5 / max_dv) : 1.0;
      v_cap += damp * dv0;
      v_b += damp * dv1;
      v_e = clamp(v_e + damp * dv2, 0.0, V_CC + 0.5);
      v_c = clamp(v_c + damp * dv3, 0.0, V_CC + 0.5);
    }
    return { v_cap, v_b, v_e, v_c };
  }
}

class PnpWaveshaperProcessor extends AudioWorkletProcessor {
  static get parameterDescriptors() {
    return [
      { name: "c2_uF", defaultValue: 1.0, minValue: 0.1, maxValue: 10.0, automationRate: "k-rate" },
      { name: "hfe", defaultValue: 300.0, minValue: 200.0, maxValue: 400.0, automationRate: "k-rate" },
      { name: "outGain", defaultValue: 0.25, minValue: 0.0, maxValue: 1.0, automationRate: "k-rate" },
      { name: "freq", defaultValue: 18.165, minValue: 18.165, maxValue: 440.0, automationRate: "k-rate" },
    ];
  }
  constructor() {
    super();
    this.ws = new WaveShaperOneIter();
    this.ws.setSampleRate(sampleRate);
    this.phase = 0.0;
    this.gate = false;
    this.port.onmessage = (e) => {
      const m = e.data;
      if (!m) return;
      if (m.type === "gate") {
        this.gate = !!m.on;
        if (!this.gate) this.ws.reset();
      }
    };
  }
  process(inputs, outputs, parameters) {
    const out = outputs[0][0];
    const c2_uF = parameters.c2_uF[0];
    const hfe = parameters.hfe[0];
    const outGain = parameters.outGain[0];
    this.ws.setC2Farad(c2_uF * 1e-6);
    this.ws.setHfe(hfe);
    const sr = sampleRate;
    for (let i = 0; i < out.length; i++) {
      if (!this.gate) {
        out[i] = 0.0;
        continue;
      }
      const f = parameters.freq.length > 1 ? parameters.freq[i] : parameters.freq[0];
      const phaseInc = f / sr;
      const t = this.phase;
      let y = 1.0 - 2.0 * t;
      y += polyBlep(t, phaseInc);
      this.phase = t + phaseInc;
      if (this.phase >= 1.0) this.phase -= 1.0;
      const v_in = 8.75 + 3.25 * y;
      const v_out = this.ws.process(v_in);
      const audio = (v_out - 6.0) * (1.0 / 6.0);
      out[i] = clamp(audio * outGain, -1.0, 1.0);
    }
    return true;
  }
}
registerProcessor("pnp-waveshaper", PnpWaveshaperProcessor);
`;

function midiNoteToHz(note) {
  return 440 * Math.pow(2, (note - 69) / 12);
}

function ccToRange(v, min, max) {
  const t = Math.min(127, Math.max(0, v)) / 127;
  return min + (max - min) * t;
}

function normToLog(norm, min, max) {
  const lo = Math.log10(min);
  const hi = Math.log10(max);
  return Math.pow(10, lo + (hi - lo) * norm);
}

function logToNorm(value, min, max) {
  const lo = Math.log10(min);
  const hi = Math.log10(max);
  return (Math.log10(value) - lo) / (hi - lo);
}

function clamp01(x) {
  return Math.min(1, Math.max(0, x));
}

function App() {
  const [ready, setReady] = useState(false);
  const [running, setRunning] = useState(false);
  const [midiState, setMidiState] = useState("MIDI: not connected");

  const [c2Norm, setC2Norm] = useState(logToNorm(1.0, 0.1, 10.0));
  const [c2uF, setC2uF] = useState(1.0);
  const [hfe, setHfe] = useState(300);
  const [outGain, setOutGain] = useState(0.25);

  const ctxRef = useRef(null);
  const nodeRef = useRef(null);
  const analyserRef = useRef(null);
  const srRef = useRef(48000);
  const freqRef = useRef(18.165);
  const scopeBufRef = useRef(null);
  const rafRef = useRef(0);
  const midiRef = useRef(null);
  const canvasRef = useRef(null);

  const workletUrl = useMemo(() => {
    const blob = new Blob([workletCode], { type: "application/javascript" });
    return URL.createObjectURL(blob);
  }, []);

  useEffect(() => {
    return () => {
      try { URL.revokeObjectURL(workletUrl); } catch {}
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [workletUrl]);

  function drawScope() {
    const canvas = canvasRef.current;
    const analyser = analyserRef.current;
    const buf = scopeBufRef.current;

    if (!canvas || !analyser || !buf) {
      rafRef.current = requestAnimationFrame(drawScope);
      return;
    }

    analyser.getFloatTimeDomainData(buf);

    const sr = srRef.current || 48000;
    const f = Math.max(18.165, Math.min(440.0, freqRef.current || 18.165));

    const periodsToShow = 2;
    let win = Math.round((sr / f) * periodsToShow);
    win = Math.max(64, Math.min(win, buf.length));

    const center = Math.floor(buf.length / 2);
    let trigIndex = center;
    let bestDist = 1e9;
    const triggerLevel = 0.0;

    for (let i = 1; i < buf.length; i++) {
      if (buf[i - 1] < triggerLevel && buf[i] >= triggerLevel) {
        const d = Math.abs(i - center);
        if (d < bestDist) {
          bestDist = d;
          trigIndex = i;
        }
      }
    }

    let start = trigIndex - Math.floor(win / 2);
    if (start < 0) start = 0;
    if (start > buf.length - win) start = buf.length - win;

    const ctx2d = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx2d.clearRect(0, 0, w, h);

    ctx2d.globalAlpha = 0.35;
    ctx2d.strokeStyle = "#888";
    ctx2d.lineWidth = 1;
    ctx2d.beginPath();
    for (let i = 1; i < 8; i++) {
      const x = (w * i) / 8;
      ctx2d.moveTo(x, 0);
      ctx2d.lineTo(x, h);
    }
    for (let i = 1; i < 4; i++) {
      const y = (h * i) / 4;
      ctx2d.moveTo(0, y);
      ctx2d.lineTo(w, y);
    }
    ctx2d.stroke();

    ctx2d.globalAlpha = 0.7;
    ctx2d.strokeStyle = "#aaa";
    ctx2d.lineWidth = 1;
    ctx2d.beginPath();
    ctx2d.moveTo(w * 0.5, 0);
    ctx2d.lineTo(w * 0.5, h);
    ctx2d.stroke();

    ctx2d.globalAlpha = 1.0;
    ctx2d.strokeStyle = "#fff";
    ctx2d.lineWidth = 2;
    ctx2d.beginPath();

    for (let i = 0; i < win; i++) {
      const s = buf[start + i];
      const x = (i / (win - 1)) * w;
      const y = (0.5 - 0.5 * s) * h;
      if (i === 0) ctx2d.moveTo(x, y);
      else ctx2d.lineTo(x, y);
    }

    ctx2d.stroke();

    rafRef.current = requestAnimationFrame(drawScope);
  }

  async function ensureAudio() {
    if (ctxRef.current && nodeRef.current) return;

    const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    srRef.current = ctx.sampleRate;

    // statechangeハンドラを設定（空でも設定することでGC回避の可能性）
    ctx.onstatechange = () => {};

    await ctx.audioWorklet.addModule(workletUrl);

    const node = new AudioWorkletNode(ctx, "pnp-waveshaper", {
      numberOfInputs: 0,
      numberOfOutputs: 1,
      outputChannelCount: [1],
    });

    const analyser = ctx.createAnalyser();
    analyser.fftSize = 32768;

    node.connect(analyser);
    analyser.connect(ctx.destination);

    ctxRef.current = ctx;
    nodeRef.current = node;
    analyserRef.current = analyser;
    scopeBufRef.current = new Float32Array(analyser.fftSize);

    freqRef.current = 18.165;

    setReady(true);

    node.parameters.get("c2_uF").setValueAtTime(c2uF, ctx.currentTime);
    node.parameters.get("hfe").setValueAtTime(hfe, ctx.currentTime);
    node.parameters.get("outGain").setValueAtTime(outGain, ctx.currentTime);
    node.parameters.get("freq").setValueAtTime(18.165, ctx.currentTime);

    if (!rafRef.current) rafRef.current = requestAnimationFrame(drawScope);
  }

  function setParam(name, value) {
    const ctx = ctxRef.current;
    const node = nodeRef.current;
    if (!ctx || !node) return;
    const p = node.parameters.get(name);
    if (!p) return;
    p.setValueAtTime(value, ctx.currentTime);
    if (name === "freq") freqRef.current = value;
  }

  async function start() {
    await ensureAudio();
    const ctx = ctxRef.current;
    const node = nodeRef.current;
    if (!ctx || !node) return;
    await ctx.resume();
    node.port.postMessage({ type: "gate", on: true });
    setRunning(true);
  }

  function stop() {
    const node = nodeRef.current;
    if (!node) return;
    node.port.postMessage({ type: "gate", on: false });
    setRunning(false);
  }

  async function connectMidi() {
    if (!navigator.requestMIDIAccess) {
      setMidiState("MIDI: Web MIDI API not available");
      return;
    }

    try {
      const access = await navigator.requestMIDIAccess();
      midiRef.current = access;

      const bindInputs = () => {
        const inputs = Array.from(access.inputs.values());
        if (inputs.length === 0) {
          setMidiState("MIDI: no inputs");
          return;
        }

        for (const input of inputs) {
          input.onmidimessage = (e) => onMidiMessage(e);
        }

        const names = inputs.map((v) => v.name || "(unnamed)").join(", ");
        setMidiState("MIDI: " + names);
      };

      access.onstatechange = () => bindInputs();
      bindInputs();
    } catch (err) {
      setMidiState("MIDI: permission denied");
    }
  }

  function onMidiMessage(e) {
    const data = e.data;
    if (!data || data.length < 2) return;

    const status = data[0] & 0xf0;
    const noteOrCc = data[1] & 0x7f;
    const value = data.length > 2 ? data[2] & 0x7f : 0;

    if (status === 0x90) {
      if (value === 0) {
        stop();
        return;
      }
      const hz = midiNoteToHz(noteOrCc);
      const f = Math.min(440, Math.max(18.165, hz));
      setParam("freq", f);
      start();
      return;
    }

    if (status === 0x80) {
      stop();
      return;
    }

    if (status === 0xb0) {
      if (noteOrCc === 21) {
        const norm = value / 127;
        const v = normToLog(norm, 0.1, 10.0);
        setC2Norm(norm);
        setC2uF(v);
        setParam("c2_uF", v);
      } else if (noteOrCc === 22) {
        const v = Math.round(ccToRange(value, 200, 400));
        setHfe(v);
        setParam("hfe", v);
      } else if (noteOrCc === 23) {
        const v = ccToRange(value, 0.0, 1.0);
        setOutGain(v);
        setParam("outGain", v);
      }
    }
  }

  useEffect(() => {
    if (!ready) return;
    setParam("c2_uF", c2uF);
  }, [c2uF, ready]);

  useEffect(() => {
    if (!ready) return;
    setParam("hfe", hfe);
  }, [hfe, ready]);

  useEffect(() => {
    if (!ready) return;
    setParam("outGain", outGain);
  }, [outGain, ready]);

  return (
    <div className="container">
      <div className="card">
        <div className="title">PNP Waveshaper Synth</div>
        <div className="subtitle">AudioWorklet + Web MIDI + Oscilloscope</div>

        <div className="btn-row">
          {!running ? (
            <button className="btn btn-primary" onClick={start}>Start</button>
          ) : (
            <button className="btn btn-secondary" onClick={stop}>Stop</button>
          )}
          <button className="btn btn-secondary" onClick={connectMidi}>Connect MIDI</button>
        </div>

        <div className="status">{midiState}</div>

        <div className="scope-box">
          <div className="scope-label">Oscilloscope</div>
          <canvas ref={canvasRef} width={720} height={200} className="scope-canvas" />
        </div>

        <div className="controls">
          <div>
            <div className="control-label">C2 (uF) CC21: {c2uF.toFixed(3)}</div>
            <input
              type="range"
              className="control-range"
              min={0}
              max={1}
              step={0.0005}
              value={c2Norm}
              onChange={(e) => {
                const n = clamp01(Number(e.target.value));
                const v = normToLog(n, 0.1, 10.0);
                setC2Norm(n);
                setC2uF(v);
              }}
            />
            <div className="control-hint">range 0.1 to 10 uF log</div>
          </div>

          <div>
            <div className="control-label">hFE CC22: {hfe}</div>
            <input
              type="range"
              className="control-range"
              min={200}
              max={400}
              step={1}
              value={hfe}
              onChange={(e) => setHfe(Math.round(Number(e.target.value)))}
            />
          </div>

          <div>
            <div className="control-label">Output gain CC23: {outGain.toFixed(3)}</div>
            <input
              type="range"
              className="control-range"
              min={0}
              max={1}
              step={0.001}
              value={outGain}
              onChange={(e) => setOutGain(Number(e.target.value))}
            />
          </div>
        </div>

        <div className="midi-help">
          MIDI: Note On で発音。Note Off で停止。CC21 C2。CC22 hFE。CC23 出力。
        </div>
      </div>

      <div className="card help">
        <div className="help-title">操作</div>
        <ol>
          <li>Start を押す</li>
          <li>Connect MIDI を押して許可</li>
          <li>MIDI キーボードからノートを送る</li>
        </ol>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
